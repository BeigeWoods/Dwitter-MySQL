name: Dwitter CI-CD

on:
  push:
    branches:
      - master

env:
  DIRECTORY: ./server
  ALLOWED_ORIGIN: localhost:3000
  JWT_SECRET: secret
  JWT_EXPIRES_SEC: 86400
  BCRYPT_SALT_ROUNDS: 12
  BCRYPT_RANDOM_WORDS: Q9D!f*1#6
  HOST_PORT: 8080
  DB_HOST: localhost
  DB_USER: user
  DB_DATABASE: database
  DB_PASSWORD: password
  CSRF_SECRET_KEY: secretKey
  GH_CLIENT_ID: githubId
  GH_CLIENT_SECRETS: githubSecret
  REGION: ap-northeast-2
  S3_BUCKET_NAME: dwitter-codes/codes
  # CODE_DEPLOY_APPLICATION_NAME:
  # CODE_DEPLOY_DEPLOYMENT_GROUP_NAME:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # Set
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: v17.4.0
          cache: "npm"
          cache-dependency-path: ./server/package-lock.json

      - name: Install Dependencies
        working-directory: $DIRECTORY
        run: npm i

      - name: Compile Typescript
        working-directory: $DIRECTORY
        run: npx tsc

      # Test
      - name: Create .env.test file
        working-directory: $DIRECTORY
        run: touch .env.test
          cat << EOF >> .env.test
          ALLOWED_ORIGIN = $ALLOWED_ORIGIN
          JWT_SECRET = $JWT_SECRET
          JWT_EXPIRES_SEC = $JWT_EXPIRES_SEC
          BCRYPT_SALT_ROUNDS = $BCRYPT_SALT_ROUNDS
          BCRYPT_RANDOM_WORDS = $BCRYPT_RANDOM_WORDS
          HOST_PORT = $HOST_PORT
          DB_HOST = $DB_HOST
          DB_USER = $DB_USER
          DB_DATABASE = $DB_DATABASE
          DB_PASSWORD = $DB_PASSWORD
          CSRF_SECRET_KEY = $CSRF_SECRET_KEY
          GH_CLIENT_ID = $GH_CLIENT_ID
          GH_CLIENT_SECRETS = $GH_CLIENT_SECRETS
          AWS_S3_REGION = newyork
          AWS_S3_ID = ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_S3_SECRET = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOF

      - name: Run jest test
        working-directory: $DIRECTORY
        run: npm test

      # AWS
      - name: Make zip file
        run: zip -r $GITHUB_SHA.zip ./server/dist -x **/__test__/**

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: $REGION

      - name: Upload to S3
        run: aws s3 cp --region $RESION ./$GITHUB_SHA.zip s3://$S3_BUCKET_NAME/$GITHUB_SHA.zip

      # - name: Code Deploy
      #   run: |
      #     aws deploy create-deployment \
      #     --deployment-config-name CodeDeployDefault.AllAtOnce \
      #     --application-name ${{ env.CODE_DEPLOY_APPLICATION_NAME }} \
      #     --deployment-group-name ${{ env.CODE_DEPLOY_DEPLOYMENT_GROUP_NAME }} \
      #     --s3-location bucket=$S3_BUCKET_NAME,bundleType=zip,key=$GITHUB_SHA.zip
